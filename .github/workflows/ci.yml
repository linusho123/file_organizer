name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Test (unit + Gherkin scenarios, coverage gate)
        run: python -m pytest

  # The Rust port: unit tests + both Gherkin sets against the native driver.
  # (The universal-binary workflow re-verifies Set B against the shipped APE,
  # but only on tags/manual runs — this job is the per-PR gate.)
  rust:
    name: rust / cargo test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Test (unit + Gherkin Set A and Set B)
        run: cargo test
